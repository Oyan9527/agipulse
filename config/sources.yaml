  # 注：Reddit 对匿名/共享出口IP限流较严，实测偶发 429（已加重试+退避）。
  # GitHub Actions 各次运行IP不同，通常不会持续触发限流；若持续失败可考虑降低这4个源的 poll 频率。
  - id: reddit-machinelearning
