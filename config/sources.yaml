# 信息源注册表
# type: rss | github_releases | arxiv | hn_algolia | reddit | generic_json
# authority_weight: 0-1，用于打分维度之一（也作为兜底排序权重）
# poll_minutes: 建议轮询间隔（实际由 Actions cron 频率统一控制，此字段仅供未来精细化调度参考）
# status: confirmed(已验证可用) | verify(构建时需校验) | broken(暂时禁用) | optional(可选/非核心)

sources:
  # ---------------- 官方博客 / 更新日志 ----------------
  - id: openai-blog
    type: rss
    url: https://openai.com/blog/rss.xml
    category_hint: [模型发布, 产品发布]
    authority_weight: 0.95
    poll_minutes: 60
    status: confirmed  # 实测 2026-07-06：1028 条，正常

  - id: anthropic-news
