# 内容分类定义（对齐 AIHOT 的 5 大类 + 补充"开源项目"独立分类，因为本项目源里 GitHub releases 占比更高）
categories:
  - id: 模型发布
    keywords_zh: [发布, 模型, 权重, 参数, 训练, 微调, 蒸馏]
    keywords_en: [model release, weights, fine-tune, checkpoint, training]

  - id: 产品发布
    keywords_zh: [上线, 功能, 更新, 发布会, 订阅, 定价]
    keywords_en: [launch, feature, update, pricing, release notes]

  - id: 开源项目
    keywords_zh: [开源, 仓库, star, 版本, release]
    keywords_en: [open source, repository, release, changelog]

  - id: 行业动态
    keywords_zh: [融资, 收购, 监管, 政策, 裁员, 人事]
    keywords_en: [funding, acquisition, regulation, policy, layoffs]

  - id: 论文研究
    keywords_zh: [论文, 研究, 基准, 评测, benchmark]
    keywords_en: [paper, arxiv, benchmark, evaluation, research]

  - id: 技巧与观点
    keywords_zh: [教程, 技巧, 观点, 复盘, 提示词]
    keywords_en: [tutorial, tips, opinion, prompt engineering]
