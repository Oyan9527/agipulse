name: Update AI signal data

on:
  schedule:
    - cron: "0 */4 * * *"   # 每 4 小时一次（0/4/8/12/16/20 点整），兼顾新鲜度与 DeepSeek 调用成本
  workflow_dispatch: {}    # 支持手动触发（首次部署用于种子数据）

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # 先跑测试再抓取：坏掉的过滤/合并/URL 校验逻辑会把脏数据写进 docs/data 并提交，
      # 而这些问题在页面上往往没有症状（比如 XSS 防线失效），等发现就晚了。
      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python -m scripts.run_pipeline --output-dir docs/data

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "no data changes, skipping commit"
            exit 0
          fi
          git commit -m "data: update feeds @ $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          # 跑流水线期间若有人往 main 推了提交，直接 push 会因 non-fast-forward 被拒，
          # 本轮抓到的数据就白白丢了。失败则 rebase 到最新 main 后重试。
          # 冲突只会出现在 docs/data（全量重写的快照），-X theirs 在 rebase 语境下
          # 指的是"正在应用的提交"，也就是本轮刚生成的数据——取新不取旧。
          for attempt in 1 2 3; do
            if git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected, rebasing onto latest main (attempt $attempt)"
            git fetch origin main
            git rebase --strategy-option=theirs origin/main || { git rebase --abort; exit 1; }
          done
          echo "push failed after 3 attempts" >&2
          exit 1
