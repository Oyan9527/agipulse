name: Update AI signal data

on:
  schedule:
    - cron: "0 * * * *"   # 每小时一次，兼顾新鲜度与 DeepSeek 调用成本
  workflow_dispatch: {}    # 支持手动触发（首次部署用于种子数据）

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python -m scripts.run_pipeline --output-dir site/data

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data
          if git diff --cached --quiet; then
            echo "no data changes, skipping commit"
          else
            git commit -m "data: update feeds @ $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
